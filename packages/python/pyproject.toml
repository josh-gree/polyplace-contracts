[project]
name = "polyplace-contracts"
version = "0.3.0"
description = "ABIs, bytecode, and dev CLI for Polyplace smart contracts"
requires-python = ">=3.10"
dependencies = [
    "web3>=6.0.0",
    "fire>=0.7.1",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[project.scripts]
polyplace-dev = "polyplace_contracts.cli:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
polyplace_contracts = ["artifacts/*.json"]
