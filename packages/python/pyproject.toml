[project]
name = "polyplace-contracts"
version = "0.3.0"
description = "ABIs, bytecode, and dev CLI for Polyplace smart contracts"
requires-python = ">=3.10"
dependencies = [
    "web3>=6.0.0",
    "fire>=0.7.1",
    "click>=8.3.3",
    "eth-abi>=5.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[project.scripts]
polyplace-dev = "polyplace_contracts.cli:main"
polyplace-deploy = "polyplace_contracts.cli.deploy:main"
polyplace-verify = "polyplace_contracts.cli.verify:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
polyplace_contracts = ["artifacts/*.json"]

[dependency-groups]
dev = [
    "ruff>=0.15.12",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
extend-select = ["I", "UP"]
